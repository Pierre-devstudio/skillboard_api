<section id="view-besoins-formations" style="display:none;">
  <div class="card bf-hero">
    <div>
      <div class="card-title">Besoins & formations</div>
      <div class="card-sub">
        Lecture manager : qui doit monter en compétence, sur quoi, avec quelle priorité et quelle suite côté Studio.
      </div>
    </div>
    <div id="bfDestinationText" class="bf-destination">Destination Studio : —</div>
  </div>

  <div class="card bf-toolbar">
    <div class="bf-filters">
      <div class="bf-field">
        <label class="sb-label" for="bfServiceSelect">Service</label>
        <select id="bfServiceSelect" class="sb-select">
          <option value="__ALL__">Tous les services</option>
        </select>
      </div>

      <div class="bf-field">
        <label class="sb-label" for="bfStatutSelect">Statut</label>
        <select id="bfStatutSelect" class="sb-select">
          <option value="tous">Tous les besoins</option>
          <option value="a_envoyer">À envoyer</option>
          <option value="envoye_studio">Envoyés au Studio</option>
          <option value="pris_en_charge">Pris en charge</option>
          <option value="traite">Traités</option>
        </select>
      </div>

      <div class="bf-field bf-field--range">
        <label class="sb-label" for="bfFragiliteRange">Fragilité min. <strong id="bfFragiliteValue">0</strong></label>
        <input type="range" id="bfFragiliteRange" min="0" max="100" step="5" value="0">
      </div>

      <div class="bf-field bf-field--range">
        <label class="sb-label" for="bfCriticiteRange">Criticité min. <strong id="bfCriticiteValue">70</strong></label>
        <input type="range" id="bfCriticiteRange" min="0" max="100" step="5" value="70">
      </div>

      <button type="button" class="sb-btn sb-btn--init" id="btnBfReset">Réinitialiser</button>
    </div>

    <div class="bf-mini-kpis" id="bfMiniKpis">
      <span class="bf-mini-kpi"><strong>—</strong><span>besoins</span></span>
      <span class="bf-mini-kpi"><strong>—</strong><span>collaborateurs</span></span>
      <span class="bf-mini-kpi"><strong>—</strong><span>postes</span></span>
    </div>
  </div>

  <div class="card bf-main-card">
    <div class="bf-list-head">
      <div>
        <div class="card-title">Besoins par poste et collaborateur</div>
        <div class="card-sub" id="bfMeta">Chargement…</div>
      </div>
      <div class="bf-actions">
        <span id="bfActionMsg" class="bf-action-msg"></span>
        <button type="button" class="sb-btn sb-btn--soft" id="btnBfRefresh">Rafraîchir</button>
        <button type="button" class="sb-btn sb-btn--accent" id="btnBfSendSelected">Envoyer la sélection au Studio</button>
      </div>
    </div>

    <div id="bfListWrap" class="bf-list-wrap">
      <div class="card-sub">Chargement des besoins…</div>
    </div>
  </div>
</section>
