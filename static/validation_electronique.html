<!-- Composant commun : validation électronique -->
<div class="modal" id="modalValidationElectronique" aria-hidden="true">
  <div class="modal-card sb-modal-card--medium ve-modal-card">
    <div class="modal-header">
      <div style="min-width:0;">
        <div class="sb-modal-title" id="ve_modalTitle">Validation électronique</div>
        <div class="card-sub" id="ve_modalSub" style="margin-top:2px;">—</div>
      </div>
      <button type="button" class="modal-x" id="btnCloseValidationElectroniqueX" aria-label="Fermer">×</button>
    </div>

    <div class="modal-body ve-modal-body">
      <div class="ve-intro">
        <div class="ve-intro-title">Signature du document</div>
        <div class="ve-intro-text">
          Choisissez un mode de signature, puis confirmez avec le curseur de validation.
        </div>
      </div>

      <div class="ve-toggle" role="group" aria-label="Mode de signature">
        <button type="button" class="ve-toggle-btn is-active" id="ve_btnModeTracee" data-mode="signature_tracee">Signature tracée</button>
        <button type="button" class="ve-toggle-btn" id="ve_btnModeGeneree" data-mode="signature_generee">Signature générée</button>
      </div>

      <div class="ve-panel is-active" id="ve_panelTracee">
        <div class="sb-label">Tracer la signature</div>
        <canvas id="ve_signatureCanvas" class="ve-sign-canvas"></canvas>
        <div class="ve-panel-actions">
          <button type="button" class="sb-btn sb-btn--soft sb-btn--xs" id="ve_btnClearCanvas">Effacer</button>
        </div>
      </div>

      <div class="ve-panel" id="ve_panelGeneree">
        <div class="sb-label">Aperçu de la signature générée</div>
        <div class="ve-generated-sign" id="ve_generatedSign">—</div>
      </div>

      <div class="ve-slider-box">
        <label class="sb-label" for="ve_confirmSlider">Glisser pour confirmer la validation électronique</label>
        <input type="range" id="ve_confirmSlider" min="0" max="100" step="1" value="0" />
      </div>
    </div>

    <div class="modal-footer ve-footer">
      <div id="ve_msg" class="sb-inline-msg" aria-live="polite"></div>
      <button type="button" class="sb-btn sb-btn--soft" id="ve_btnLater">Signer plus tard</button>
      <button type="button" class="sb-btn sb-btn--accent" id="ve_btnConfirm" disabled>Confirmer la signature</button>
    </div>
  </div>
</div>
