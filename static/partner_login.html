<!doctype html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="novoskill_typography.css">
  <meta charset="utf-8" />
  <title>Novoskill Partner — Connexion</title>

  <link rel="icon" href="/favicon-partner.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-partner-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-partner-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-partner.png">

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="/portal_common.css" />

  <style>
    :root{
      --accent:#67C63D;
      --partner-accent-rgb:103,198,61;
    }

    body{
      margin:0;
      min-height:100vh;
      background:#f3f4f6;
      display:block;
    }

    .login-wrap{
      min-height:100vh;
      display:flex;
      align-items:stretch;
      justify-content:stretch;
      padding:0;
    }

    .login-left{
      flex:0 0 520px;
      max-width:520px;
      width:520px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .login-right{
      flex:1;
      min-width:0;
      background:url("/skills_login_hero.webp") center center / cover no-repeat;
      position:relative;
    }

    .login-right::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(255,255,255,0.08);
      pointer-events:none;
    }

    @media (max-width: 980px){
      .login-right{ display:none; }
      .login-left{
        flex:1;
        max-width:none;
        width:100%;
      }
      .login-card{
        max-width:480px;
      }
    }

    .login-card{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:18px;
      box-shadow:0 6px 20px rgba(0,0,0,.06);
    }

    .login-title{
      font-size:var(--ns-title-sm, 1.0625rem);
      font-weight:var(--ns-weight-semibold, 600);
      margin:0 0 6px 0;
    }

    .login-row{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:12px;
    }

    .login-row label{
      font-size:var(--ns-text-xs, 0.75rem);
      color:#374151;
      font-weight:var(--ns-weight-semibold, 600);
    }

    .login-row input{
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:10px 12px;
      font-size:var(--ns-text-md, 0.875rem);
      outline:none;
      background:#fff;
    }

    .login-row input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(var(--partner-accent-rgb), .12);
    }

    .login-actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
    }

    .btn-primary{
      border:1px solid var(--accent);
      background:var(--accent);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-weight:var(--ns-weight-bold, 700);
      cursor:pointer;
      font-size:var(--ns-text-md, 0.875rem);
    }

    .btn-primary:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .link{
      color:var(--accent);
      text-decoration:none;
      font-weight:var(--ns-weight-semibold, 600);
      font-size:var(--ns-text-sm, 0.8125rem);
      cursor:pointer;
      user-select:none;
    }

    .panel{ display:none; }
    .panel.active{ display:block; }

    .msg{
      margin:10px 0 0 0;
      font-size:var(--ns-text-sm, 0.8125rem);
      color:#111827;
    }

    .msg.error{ color:#b91c1c; }
    .msg.success{ color:#065f46; }

    .brand-line{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .brand-name{
      font-size:var(--ns-text-sm, 0.8125rem);
      font-weight:var(--ns-weight-bold, 700);
      color:#111827;
      letter-spacing:0;
    }

    .brand-module{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      font-size:var(--ns-text-xs, 0.75rem);
      font-weight:var(--ns-weight-bold, 700);
      letter-spacing:0;
      box-shadow:0 4px 12px rgba(var(--partner-accent-rgb), .18);
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-left">
      <div class="login-card">
        <div class="brand-line">
          <div class="brand-name">Novoskill</div>
          <div class="brand-module">Partner</div>
        </div>

        <div class="panel active" id="panelLogin">
          <h1 class="login-title">Connexion</h1>

          <div class="login-row">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" autocomplete="username" placeholder="prenom.nom@entreprise.fr">
          </div>

          <div class="login-row">
            <label for="loginPassword">Mot de passe</label>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••">
          </div>

          <div class="login-actions">
            <button class="btn-primary" id="btnLogin">Se connecter</button>
            <span class="link" id="lnkForgot">Mot de passe oublié</span>
          </div>
        </div>

        <div class="panel" id="panelForgot">
          <h1 class="login-title">Réinitialisation</h1>

          <div class="login-row">
            <label for="resetEmail">Email</label>
            <input id="resetEmail" type="email" autocomplete="username" placeholder="prenom.nom@entreprise.fr">
          </div>

          <div class="login-actions">
            <button class="btn-primary" id="btnSendReset">Envoyer le lien</button>
            <span class="link" id="lnkBack">Retour</span>
          </div>
        </div>

        <div class="msg" id="msgBox"></div>
      </div>
    </div>

    <div class="login-right" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal_auth_common.js"></script>
  <script src="/partner_login.js"></script>
</body>
</html>
