<!doctype html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="/novoskill_typography.css">
  <link rel="stylesheet" href="/novoskill_visual_tokens.css">
  <meta charset="utf-8" />
  <title>Portail Novoskill - People</title>

  <link rel="icon" href="/favicon-people.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-people-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-people-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-people.png">

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="/portal_common.css" />
  <link rel="stylesheet" href="/people_portal_theme.css" />
</head>

<body>
  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="brand">Novoskill</span>
      <span class="ns-badge product-badge">People</span>
    </div>

    <nav class="menu">
      <div class="menu-item active" data-view="dashboard">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-legacy-0fdedc5844b6"></use></svg>
        </span>
        <span class="menu-item-label">Dashboard</span>
      </div>
      <div class="menu-item" data-view="informations">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-info"></use></svg>
        </span>
        <span class="menu-item-label">Vos informations</span>
      </div>
      <div class="menu-item" data-view="calendrier">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-calendar"></use></svg>
        </span>
        <span class="menu-item-label">Votre calendrier</span>
      </div>
      <div class="menu-item" data-view="echanges">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-comment"></use></svg>
        </span>
        <span class="menu-item-label">Vos échanges</span>
      </div>

      <div class="menu-separator"></div>

      <div class="menu-item" data-view="entretiens">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-legacy-06ef980a686d"></use></svg>
        </span>
        <span class="menu-item-label">Vos entretiens</span>
      </div>
      <div class="menu-item" data-view="formations">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-legacy-e51259e661ea"></use></svg>
        </span>
        <span class="menu-item-label">Vos formations</span>
      </div>
      <div class="menu-item" data-view="competences">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-competence"></use></svg>
        </span>
        <span class="menu-item-label">Vos compétences</span>
      </div>
      <div class="menu-item" data-view="parcours">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-legacy-223e87074d62"></use></svg>
        </span>
        <span class="menu-item-label">Votre parcours</span>
      </div>
      <div class="menu-item" data-view="mobilite_interne">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-job"></use></svg>
        </span>
        <span class="menu-item-label">Mobilité interne</span>
      </div>

      <div class="menu-separator"></div>

      <div class="menu-item" data-view="accompagnement">
        <span class="menu-item-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-comment"></use></svg>
        </span>
        <span class="menu-item-label">Accompagnement Novoskill</span>
      </div>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="btnMenuToggle" aria-label="Ouvrir le menu">&#9776;</button>
        <div class="people-topbar-scope">
          <div id="topbarName" class="people-topbar-scope-name">Entreprise</div>
          <div class="people-topbar-scope-line">
            <span class="people-topbar-status-dot" aria-hidden="true"></span>
            <span id="topbarSubtitle">Console People · Accès actif</span>
          </div>
        </div>
      </div>

      <div class="topbar-right topbar-actions">
        <div id="topbarInfo" class="people-topbar-user">
          <div id="topbarUserName" class="people-topbar-user-name">Chargement…</div>
          <div id="topbarUserRole" class="people-topbar-user-role"></div>
        </div>

        <select id="selPeopleProfile" class="sb-topbar-select" style="display:none;">
          <option value="">Profil…</option>
        </select>

        <button id="btnLogout" class="sb-btn-ghost sb-btn-ghost--icon" style="display:none;">
          <span class="sb-btn-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" class="ns-icon-use"><use href="/novoskill_icons.svg#ns-icon-legacy-819c04ddf822"></use></svg>
          </span>
          <span>Déconnexion</span>
        </button>
      </div>
    </header>

    <main class="content">
      <div id="alertContainer"></div>
      <div id="viewsContainer"></div>
    </main>
  </div>

  <script>
    window.PORTAL_NO_AUTOINIT = true;
    window.PORTAL_LOGIN_URL = "/people_login.html";
  </script>

  <script src="/portal_common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal_auth_common.js"></script>

  <script src="/people_portal_auth.js"></script>
  <script src="/people_portal.js"></script>

  <script>
    (async () => {
      try {
        await (window.__peopleAuthReady || Promise.resolve(null));
      } catch (_) {}
      window.portal.init();
    })();
  </script>
</body>
</html>
