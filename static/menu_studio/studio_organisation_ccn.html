<template id="tplStudioOrganisationCcnBlock">
  <div class="card org-bloc sb-span-2" id="posteBlocCcn" style="margin-top:10px;">
    <div class="sb-block-head">
      <div>
        <div class="card-title" style="margin:0;">Cotation conventionnelle</div>
        <div class="card-sub" id="posteCcnSub" style="margin:4px 0 0 0;">
          Assistant dédié à la cotation de l’emploi selon la convention collective détectée.
        </div>
      </div>

      <div class="sb-actions">
        <button type="button" class="sb-btn sb-btn--doc" id="btnPosteCcnOpen">Assistant cotation conventionnelle</button>
      </div>
    </div>

    <div class="sb-form-grid" style="margin-top:10px;">
      <div class="sb-field">
        <div class="label">Convention détectée</div>
        <input type="text" id="posteCcnConvention" readonly />
      </div>

      <div class="sb-field">
        <div class="label">Statut</div>
        <input type="text" id="posteCcnStatus" class="sb-ccn-topval" readonly />
      </div>

      <div class="sb-field">
        <div class="label" id="posteCcnResultLabel">Coefficient / palier retenu</div>
        <input type="text" id="posteCcnResult" readonly />
      </div>

      <div class="sb-field">
        <div class="label" id="posteCcnCategoryLabel">Catégorie retenue</div>
        <input type="text" id="posteCcnCategory" readonly />
      </div>

      <div class="sb-field sb-span-2">
        <div class="label">Synthèse</div>
        <textarea id="posteCcnSummary" class="sb-textarea--compact sb-ccn-text" rows="4" readonly></textarea>
      </div>
    </div>
  </div>
</template>

<template id="tplStudioOrganisationCcnModal">
  <div class="sb-modal" id="modalPosteCcn" style="display:none;">
    <div class="sb-modal-card">
      <div class="sb-modal-head">
        <div>
          <div class="card-title" style="margin:0;">Assistant cotation conventionnelle</div>
          <div class="card-sub" id="posteCcnModalSub" style="margin:4px 0 0 0;">
            Proposition IA de cotation sur la base de la fiche de poste et du référentiel conventionnel national.
          </div>
        </div>
        <button type="button" class="sb-modal-x" id="btnPosteCcnX" aria-label="Fermer">×</button>
      </div>

      <div class="sb-modal-body">
        <div class="sb-form-grid">
          <div class="sb-field">
            <div class="label">Convention</div>
            <input type="text" id="posteCcnModalConvention" readonly />
          </div>

          <div class="sb-field">
            <div class="label">Version référentiel</div>
            <input type="text" id="posteCcnModalVersion" readonly />
          </div>

          <div class="sb-field">
            <div class="label">Poste</div>
            <input type="text" id="posteCcnModalPoste" readonly />
          </div>

          <div class="sb-field">
            <div class="label">Service</div>
            <input type="text" id="posteCcnModalService" readonly />
          </div>

          <div class="sb-field sb-span-2">
            <div class="label">Base d’analyse</div>
            <textarea id="posteCcnModalBase" class="sb-textarea--compact sb-ccn-text" rows="3" readonly></textarea>
          </div>
        </div>

        <div class="card org-bloc" style="margin-top:12px;">
          <div class="sb-block-head">
            <div>
              <div class="card-title" style="margin:0;">Proposition IA</div>
              <div class="card-sub" style="margin:4px 0 0 0;">
                La proposition repose sur les critères classants applicables et la grille de l’IDCC supporté.
              </div>
            </div>

            <div class="sb-actions">
              <button type="button" class="sb-btn sb-btn--ai" id="btnPosteCcnAnalyze">Lancer l’analyse</button>
              <button type="button" class="sb-btn sb-btn--soft" id="btnPosteCcnReuse">Reprendre la proposition IA</button>
            </div>
          </div>

          <div class="sb-kpi-grid" style="margin-top:12px;">
            <div class="sb-kpi-card">
              <div class="sb-kpi-label" id="posteCcnPropCoeffLabel">Coefficient proposé</div>
              <div class="sb-kpi-value" id="posteCcnPropCoeff">—</div>
            </div>
            <div class="sb-kpi-card">
              <div class="sb-kpi-label" id="posteCcnPropPalierLabel">Palier proposé</div>
              <div class="sb-kpi-value" id="posteCcnPropPalier">—</div>
            </div>
            <div class="sb-kpi-card">
              <div class="sb-kpi-label" id="posteCcnPropCategorieLabel">Catégorie proposée</div>
              <div class="sb-kpi-value" id="posteCcnPropCategorie">—</div>
            </div>
            <div class="sb-kpi-card">
              <div class="sb-kpi-label" id="posteCcnPropPointsLabel">Points calculés</div>
              <div class="sb-kpi-value" id="posteCcnPropPoints">—</div>
            </div>
          </div>

          <div class="sb-field" style="margin-top:12px;">
            <div class="label">Synthèse de cotation</div>
            <textarea id="posteCcnPropResume" class="sb-textarea--compact sb-ccn-text" rows="2" readonly></textarea>
          </div>

          <div class="sb-field" style="margin-top:10px;">
            <div class="label">Justification IA</div>
            <textarea id="posteCcnPropJustification" class="sb-textarea--compact sb-ccn-text" rows="7" readonly></textarea>
          </div>

          <div class="table-wrap" style="margin-top:12px;">
            <table class="sb-table sb-ccn-table" id="posteCcnCriteriaTable">
              <thead>
                <tr>
                  <th>Critère / bonification</th>
                  <th id="posteCcnCritHeadLevel" style="width:90px; text-align:center;">Niveau</th>
                  <th id="posteCcnCritHeadPoints" style="width:90px; text-align:center;">Points</th>
                  <th>Justification</th>
                </tr>
              </thead>
              <tbody id="posteCcnCriteriaTbody"></tbody>
            </table>
            <div class="card-sub" id="posteCcnCriteriaEmpty" style="margin-top:8px;">
              Aucune analyse réalisée pour le moment.
            </div>
          </div>
        </div>

        <div class="card org-bloc" style="margin-top:12px;">
          <div class="card-title" style="margin:0;">Décision RH</div>
          <div class="card-sub" style="margin:4px 0 0 0;">
            La cotation retenue peut être ajustée avant enregistrement.
          </div>

          <div class="sb-form-grid" style="margin-top:10px;">
            <div class="sb-field">
              <div class="label" id="posteCcnFinalCoefficientLabel">Coefficient retenu</div>
              <input type="number" id="posteCcnFinalCoefficient" min="1" step="1" />
            </div>

            <div class="sb-field">
              <div class="label" id="posteCcnFinalPalierLabel">Palier retenu</div>
              <input type="number" id="posteCcnFinalPalier" min="1" step="1" />
            </div>

            <div class="sb-field">
              <div class="label" id="posteCcnFinalCategorieLabel">Catégorie retenue</div>
              <input type="text" id="posteCcnFinalCategorie" readonly />
            </div>

            <div class="sb-field sb-span-2">
              <div class="label">Justification retenue / commentaire RH</div>
              <textarea id="posteCcnFinalJustification" class="sb-textarea--compact sb-ccn-text" rows="6" placeholder="Ajuste la justification ou ajoute l'arbitrage RH."></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="sb-modal-foot">
        <button type="button" class="sb-btn sb-btn--soft" id="btnPosteCcnCancel">Fermer</button>
        <button type="button" class="sb-btn sb-btn--accent" id="btnPosteCcnSave">Enregistrer la cotation</button>
      </div>
    </div>
  </div>
</template>
