<!doctype html>
<html lang="fr">
<head>
  <link rel="stylesheet" href="/novoskill_typography.css">
  <link rel="stylesheet" href="/novoskill_visual_tokens.css">
  <meta charset="utf-8" />
  <title>Novoskill Learn — Nouveau mot de passe</title>

  <link rel="icon" href="/favicon-learn.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-learn-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-learn-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-learn.png">

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="/portal_common.css" />

  <style>
    :root{
      --accent:#E724F3;
      --lp-accent-rgb:231,36,243;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:18px;
      box-shadow:0 6px 20px rgba(0,0,0,.06);
    }

    .title{
      font-size:var(--ns-title-sm, 1.0625rem);
      font-weight:var(--ns-weight-bold, 700);
      margin:0 0 6px 0;
    }

    .sub{
      margin:0 0 14px 0;
      color:#4b5563;
      font-size:var(--ns-text-sm, 0.8125rem);
    }

    .row{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:12px;
    }

    .row label{
      font-size:var(--ns-text-xs, 0.75rem);
      color:#374151;
      font-weight:var(--ns-weight-semibold, 600);
    }

    .row input{
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:10px 12px;
      font-size:var(--ns-text-md, 0.875rem);
      outline:none;
    }

    .row input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(var(--lp-accent-rgb), .12);
    }

    .btn{
      border:1px solid var(--accent);
      background:var(--accent);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-weight:var(--ns-weight-bold, 700);
      cursor:pointer;
      font-size:var(--ns-text-md, 0.875rem);
      width:100%;
    }

    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .msg{
      margin-top:10px;
      font-size:var(--ns-text-sm, 0.8125rem);
    }

    .msg.error{ color:#b91c1c; }
    .msg.success{ color:#065f46; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">Nouveau mot de passe</h1>
      <p class="sub">Choisissez un mot de passe solide.</p>

      <div class="row">
        <label for="pwd1">Nouveau mot de passe</label>
        <input id="pwd1" type="password" autocomplete="new-password" placeholder="••••••••">
      </div>

      <div class="row">
        <label for="pwd2">Confirmation</label>
        <input id="pwd2" type="password" autocomplete="new-password" placeholder="••••••••">
      </div>

      <button class="btn" id="btnUpdatePwd">Mettre à jour</button>

      <div class="msg" id="msgBox"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal_auth_common.js"></script>
  <script src="/learn_reset_password.js"></script>
</body>
</html>
